<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FasimCare+ - Manajemen Peternakan Ayam Modern</title>
    
    <meta name="description" content="Sistem Manajemen Peternakan Ayam Modern - Kelola produksi telur, broiler, pakan, kesehatan, dan AI assistant">
    <meta name="theme-color" content="#0284C7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FasimCare+">
    
    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" href="fasimcare.png">
    <link rel="apple-touch-icon" href="fasimcare.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css">
    <link rel="stylesheet" href="gabung.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- React 18 -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Moment.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/id.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        /* RESET & BASE - TIDAK ADA OPACITY BERMASALAH */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #F0F9FF;
            overflow-x: hidden;
        }
        
        /* ===== FIX: BUTTON & ICON CLICK STYLES - TANPA OPACITY ===== */
        button, 
        .btn-icon, 
        .nav-item-horizontal, 
        .kpi-card, 
        .list-item,
        .header-icon-wrapper i,
        .fab-button,
        .consultation-button,
        .modal-close,
        .fab-panel-item,
        .category-btn,
        .product-card,
        .quick-reply-chip {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease, background 0.2s ease;
        }
        
        button:active, 
        .btn-icon:active, 
        .nav-item-horizontal:active,
        .header-icon-wrapper i:active,
        .fab-button:active,
        .consultation-button:active,
        .modal-close:active,
        .fab-panel-item:active,
        .category-btn:active,
        .quick-reply-chip:active {
            transform: scale(0.96);
        }
        
        /* KPI card active state */
        .kpi-card:active {
            transform: scale(0.98);
        }
        
        /* List item active */
        .list-item:active {
            background: var(--surface-hover);
        }
        
        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, #0284C7, #0369A1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        
        .splash-content {
            text-align: center;
            padding: 24px;
            animation: fadeInScale 0.6s ease-out;
        }
        
        .splash-icon {
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        
        .splash-icon img {
            width: 100px;
            background: white;
            border-radius: 28px;
            padding: 12px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }
        
        .splash-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #FFFFFF 0%, #BAE6FD 40%, #FFFFFF 60%, #BAE6FD 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        
        .splash-subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 28px;
            font-weight: 600;
            color: #BAE6FD;
            text-transform: uppercase;
        }
        
        .splash-spinner {
            position: relative;
            width: 56px;
            height: 56px;
            margin: 24px auto;
        }
        
        .splash-spinner::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #BAE6FD, #38BDF8, #BAE6FD);
            animation: spinReveal 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        .splash-spinner::after {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #0284C7, #0369A1);
            animation: pulseScale 1.2s ease-in-out infinite;
        }
        
        .splash-loading-text {
            font-size: 13px;
            font-weight: 500;
            color: #BAE6FD;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .splash-progress {
            width: 240px;
            max-width: 70vw;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            margin: 16px auto 0;
            overflow: hidden;
        }
        
        .splash-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #BAE6FD, #38BDF8, #BAE6FD);
            border-radius: 4px;
            animation: progressLoad 2s ease-out forwards;
        }
        
        #root {
            opacity: 0;
            transition: opacity 0.3s ease;
            min-height: 100vh;
        }
        
        #root.visible {
            opacity: 1;
        }
        
        .loading-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #F0F9FF;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #BAE6FD;
            border-top-color: #0284C7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        /* PWA Install Button */
        .pwa-install-btn {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: linear-gradient(135deg, #0284C7, #0EA5E9);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 999;
            box-shadow: 0 4px 12px rgba(2,132,199,0.4);
            cursor: pointer;
            animation: pwa-pulse 2s infinite;
        }
        
        @keyframes pwa-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; box-shadow: 0 4px 20px rgba(2,132,199,0.6); }
        }
        
        .pwa-install-btn:hover {
            transform: scale(1.02);
        }
        
        /* PWA Mode */
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
            .app-header {
                padding-top: env(safe-area-inset-top);
            }
            .pwa-install-btn {
                display: none !important;
            }
        }
        
        /* iOS specific fixes */
        @supports (-webkit-touch-callout: none) {
            .mobile-container {
                height: -webkit-fill-available;
            }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #0284C7;
            border-radius: 10px;
        }
        
        /* Error handler */
        .error-boundary {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #F0F9FF;
            padding: 20px;
        }
        
        .error-card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .error-card i {
            font-size: 48px;
            color: #0284C7;
            margin-bottom: 16px;
        }
        
        .error-card h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #0F172A;
        }
        
        .error-card p {
            color: #64748B;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .error-card button {
            background: #0284C7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Dark mode for iOS modal */
        @media (prefers-color-scheme: dark) {
            #ios-guide-modal > div > div {
                background: #1e293b !important;
                color: #f1f5f9 !important;
            }
            #ios-guide-modal button {
                background: #0EA5E9 !important;
            }
        }
        
        /* Animations */
        @keyframes float {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.02); }
        }
        
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        @keyframes spinReveal {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulseScale {
            0%,100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(0.95); opacity: 1; }
        }
        
        @keyframes progressLoad {
            0% { width: 0%; }
            30% { width: 45%; }
            60% { width: 75%; }
            100% { width: 100%; }
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="splash-screen">

    <!-- Scripts -->
    <script src="firebase-config.js"></script>
    <script src="fitur/scheduler.js"></script>

    <!-- SINGLE PWA & IOS FIXES SCRIPT (NO DUPLICATES) -->
    <script>
    (function() {
        'use strict';
        
        // ========== DETECT iOS ==========
        const isIOS = () => {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        };
        
        const isRunningStandalone = () => {
            return window.matchMedia('(display-mode: standalone)').matches || 
                   (window.navigator.standalone === true);
        };
        
        // ========== 1. GENERATE FALLBACK ICONS ==========
        const generateFallbackIcons = () => {
            const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let generatedCount = 0;
            
            sizes.forEach(size => {
                const existingLink = document.querySelector(`link[sizes="${size}x${size}"]`);
                if (existingLink && existingLink.href && !existingLink.href.includes('data:image')) {
                    return;
                }
                
                try {
                    canvas.width = size;
                    canvas.height = size;
                    
                    const grad = ctx.createLinearGradient(0, 0, size, size);
                    grad.addColorStop(0, '#0284C7');
                    grad.addColorStop(1, '#0369A1');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, size, size);
                    
                    ctx.fillStyle = 'white';
                    const fontSize = size * 0.48;
                    ctx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🐔', size/2, size/2);
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    localStorage.setItem(`pwa_fallback_icon_${size}`, dataUrl);
                    
                    const appleLink = document.createElement('link');
                    appleLink.rel = 'apple-touch-icon';
                    appleLink.sizes = `${size}x${size}`;
                    appleLink.href = dataUrl;
                    document.head.appendChild(appleLink);
                    
                    generatedCount++;
                } catch(e) {
                    console.warn('Failed to generate icon:', e);
                }
            });
            
            if (generatedCount > 0) {
                console.log('✅ PWA: Generated ' + generatedCount + ' fallback icons');
            }
        };
        
        // ========== 2. FIX MANIFEST ==========
        const fixManifest = () => {
            const manifestLink = document.querySelector('link[rel="manifest"]');
            if (!manifestLink) return;
            
            fetch(manifestLink.href)
                .then(response => response.json())
                .then(manifest => {
                    let needsUpdate = false;
                    const updatedManifest = { ...manifest };
                    
                    if (!manifest.theme_color || manifest.theme_color === '#5D3A1A') {
                        updatedManifest.theme_color = '#0284C7';
                        needsUpdate = true;
                    }
                    if (!manifest.background_color || manifest.background_color === '#FDF8F0') {
                        updatedManifest.background_color = '#F0F9FF';
                        needsUpdate = true;
                    }
                    if (needsUpdate) {
                        console.log('✅ PWA: Manifest updated');
                        localStorage.setItem('pwa_manifest_fixed', JSON.stringify(updatedManifest));
                    }
                })
                .catch(() => {});
        };
        
        // ========== 3. REGISTER SERVICE WORKER (ONCE) ==========
        const registerServiceWorker = () => {
            if (!('serviceWorker' in navigator)) return;
            
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('✅ PWA: Service Worker registered');
                    
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('✅ PWA: Update available');
                            }
                        });
                    });
                })
                .catch(error => {
                    console.error('❌ PWA: Service Worker registration failed:', error);
                });
            
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        };
        
        // ========== 4. CHECK PWA INSTALLABILITY (ANDROID) ==========
        const checkPWAInstallability = () => {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                window.pwaDeferredPrompt = e;
                console.log('✅ PWA: Install prompt available');
                
                const installBtn = document.querySelector('.pwa-install-btn');
                if (installBtn) installBtn.style.display = 'flex';
            });
            
            window.addEventListener('appinstalled', () => {
                console.log('✅ PWA: App installed');
                localStorage.setItem('pwa_installed', 'true');
                const installBtn = document.querySelector('.pwa-install-btn');
                if (installBtn) installBtn.style.display = 'none';
            });
            
            if (window.matchMedia('(display-mode: standalone)').matches) {
                console.log('✅ PWA: Running in standalone mode');
                localStorage.setItem('pwa_installed', 'true');
            }
        };
        
        // ========== 5. SETUP OFFLINE HANDLING ==========
        const setupOfflineHandling = () => {
            window.addEventListener('online', () => {
                console.log('📡 PWA: Back online');
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'SYNC_DATA',
                        timestamp: Date.now()
                    });
                }
            });
            
            window.addEventListener('offline', () => {
                console.log('📡 PWA: Offline mode');
            });
        };
        
        // ========== 6. CLEANUP OLD CACHES ==========
        const cleanupOldCaches = async () => {
            if (!('caches' in window)) return;
            
            try {
                const cacheNames = await caches.keys();
                for (const cacheName of cacheNames) {
                    if (cacheName.startsWith('fasim') && !cacheName.includes('v2')) {
                        await caches.delete(cacheName);
                        console.log('🗑️ Deleted old cache: ' + cacheName);
                    }
                }
            } catch(e) {}
        };
        
        // ========== 7. ADD INSTALL BUTTON (ANDROID) ==========
        const addInstallButton = () => {
            if (localStorage.getItem('pwa_installed') === 'true') return;
            if (window.matchMedia('(display-mode: standalone)').matches) return;
            if (document.querySelector('.pwa-install-btn')) return;
            
            const installBtn = document.createElement('button');
            installBtn.className = 'pwa-install-btn';
            installBtn.innerHTML = '<i class="fas fa-download"></i> Install Aplikasi';
            
            installBtn.onclick = () => {
                if (window.pwaDeferredPrompt) {
                    window.pwaDeferredPrompt.prompt();
                    window.pwaDeferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('✅ User accepted install');
                            installBtn.style.display = 'none';
                        }
                        window.pwaDeferredPrompt = null;
                    });
                } else {
                    console.log('ℹ️ Install prompt not available');
                }
            };
            
            document.body.appendChild(installBtn);
        };
        
        // ========== 8. IOS GUIDE MODAL ==========
        const showIOSGuide = () => {
            if (!isIOS()) return;
            if (isRunningStandalone()) return;
            if (localStorage.getItem('ios_guide_shown') === 'true') return;
            
            setTimeout(() => {
                const modal = document.createElement('div');
                modal.id = 'ios-guide-modal';
                modal.innerHTML = `
                    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;">
                        <div style="background:white;border-radius:28px;padding:24px;max-width:320px;text-align:center;color:#1e293b;">
                            <div style="font-size:48px;margin-bottom:16px;">📱</div>
                            <h3 style="margin-bottom:12px;">Install Aplikasi</h3>
                            <p style="margin-bottom:20px;font-size:14px;">Tap ikon <strong>Bagikan</strong> lalu pilih <strong>Tambahkan ke Layar Utama</strong></p>
                            <div style="background:#f1f5f9;border-radius:16px;padding:16px;margin-bottom:20px;">
                                <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
                                    <span style="font-size:24px;">📤</span>
                                    <span style="font-size:20px;">→</span>
                                    <span style="font-size:24px;">➕</span>
                                </div>
                                <p style="font-size:12px;margin-top:8px;">Share → Add to Home Screen</p>
                            </div>
                            <button id="ios-guide-close" style="background:#0284C7;color:white;border:none;padding:12px 24px;border-radius:40px;font-weight:600;width:100%;">Mengerti</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                localStorage.setItem('ios_guide_shown', 'true');
                
                document.getElementById('ios-guide-close')?.addEventListener('click', () => {
                    modal.remove();
                });
            }, 1500);
        };
        
        // ========== 9. HIDE SPLASH SCREEN ==========
        const hideSplashScreen = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        if (splash.parentNode) splash.parentNode.removeChild(splash);
                        const root = document.getElementById('root');
                        if (root) root.classList.add('visible');
                    }, 300);
                }
            }, 2500);
        };
        
        // ========== 10. DYNAMIC LOADING MESSAGES ==========
        const setupDynamicMessages = () => {
            const messages = [
                { icon: "fa-egg", text: "Menghitung produksi telur..." },
                { icon: "fa-drumstick-bite", text: "Menganalisis data broiler..." },
                { icon: "fa-syringe", text: "Memeriksa jadwal vaksinasi..." },
                { icon: "fa-users", text: "Memuat data pekerja..." },
                { icon: "fa-chart-pie", text: "Menyiapkan laporan keuangan..." },
                { icon: "fa-robot", text: "Mengaktifkan AI Si Jago..." },
                { icon: "fa-cloud-upload-alt", text: "Menyinkronkan data cloud..." },
                { icon: "fa-check-circle", text: "Hampir selesai..." }
            ];
            
            const mainMessages = [
                "Memuat data peternakan",
                "Mempersiapkan dashboard",
                "Menyinkronkan database",
                "Selamat datang kembali"
            ];
            
            let messageIndex = 0;
            let mainIndex = 0;
            const messageElement = document.getElementById('splash-dynamic-message');
            const loadingMessageElement = document.getElementById('splash-loading-message');
            
            if (messageElement) {
                setInterval(() => {
                    messageIndex = (messageIndex + 1) % messages.length;
                    const msg = messages[messageIndex];
                    messageElement.innerHTML = '<i class=\"fas ' + msg.icon + '\"></i> ' + msg.text;
                }, 1800);
            }
            
            if (loadingMessageElement) {
                setInterval(() => {
                    mainIndex = (mainIndex + 1) % mainMessages.length;
                    loadingMessageElement.textContent = mainMessages[mainIndex];
                }, 2500);
            }
        };
        
        // ========== 11. GLOBAL ERROR HANDLER ==========
        const setupGlobalErrorHandler = () => {
            window.addEventListener('error', function(e) {
                console.error('Global error:', e.error);
                const root = document.getElementById('root');
                if (root && root.innerHTML.includes('loading-fallback')) {
                    root.innerHTML = `
                        <div class="error-boundary">
                            <div class="error-card">
                                <i class="fas fa-bug"></i>
                                <h3>Error Memuat Aplikasi</h3>
                                <p>${e.error?.message || 'Terjadi kesalahan teknis'}</p>
                                <button onclick="location.reload()">🔄 Refresh Halaman</button>
                            </div>
                        </div>
                    `;
                    root.classList.add('visible');
                }
            });
        };
        
        // ========== 12. FALLBACK RENDER ==========
        const setupFallbackRender = () => {
            setTimeout(function() {
                var root = document.getElementById('root');
                if (root && root.innerHTML.includes('loading-fallback') && !root.innerHTML.includes('FasimCare')) {
                    console.warn('⚠️ App not rendering, trying fallback...');
                    if (window.FasimCare && typeof window.FasimCare === 'function') {
                        try {
                            if (ReactDOM.createRoot) {
                                ReactDOM.createRoot(root).render(React.createElement(window.FasimCare));
                            } else {
                                ReactDOM.render(React.createElement(window.FasimCare), root);
                            }
                            console.log('✅ Fallback render successful');
                        } catch(e) {
                            console.error('Fallback render failed:', e);
                        }
                    } else {
                        root.innerHTML = `
                            <div class="error-boundary">
                                <div class="error-card">
                                    <i class="fas fa-chicken"></i>
                                    <h3>FasimCare+</h3>
                                    <p>Aplikasi sedang dimuat. Silakan refresh jika tidak muncul dalam beberapa detik.</p>
                                    <button onclick="location.reload()">🔄 Refresh</button>
                                </div>
                            </div>
                        `;
                        root.classList.add('visible');
                    }
                }
            }, 5000);
        };
        
        // ========== INIT ALL (NO DUPLICATES) ==========
        const init = () => {
            console.log('🔧 PWA & iOS: Initializing...');
            
            generateFallbackIcons();
            fixManifest();
            registerServiceWorker();
            checkPWAInstallability();
            setupOfflineHandling();
            cleanupOldCaches();
            addInstallButton();
            showIOSGuide();
            setupDynamicMessages();
            setupGlobalErrorHandler();
            setupFallbackRender();
            hideSplashScreen();
            
            console.log('✅ PWA & iOS: All fixes applied');
        };
        
        // Run when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
